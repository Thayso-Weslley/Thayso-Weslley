name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          
          # ATIVAÇÃO COMPLETA DE LINGUAGENS
          plugin_languages: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_ignored: html, css
          
          # FORÇAR O ROBÔ A PEGAR TUDO
          repositories_batch: 100
          plugin_languages_limit: 8
          plugin_languages_other: yes
          # Mude para 'yes' abaixo se quiser incluir repositórios que você clonou de outros (forks)
          plugin_languages_indepth: yes
